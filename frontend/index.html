<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>xCSG Value Tracker — Alira Health</title>
  <link rel="stylesheet" href="/styles.css?v=20260402">
  <script src="https://cdn.jsdelivr.net/npm/chart.js@4.4.0/dist/chart.umd.min.js" defer></script>
  <script src="/app.js?v=20260402" defer></script>
</head>
<body>

<!-- ─── Toast Container ───────────────────────────────────────────────────── -->
<div id="toastContainer"></div>

<!-- ─── Modal ────────────────────────────────────────────────────────────── -->
<div class="modal-overlay" id="globalModal">
  <div class="modal-card" id="globalModalCard">
    <!-- populated by JS -->
  </div>
</div>

<!-- ═══════════════════════════════════════════════════════════════════════════
     LOGIN SCREEN
     ═══════════════════════════════════════════════════════════════════════════ -->
<div id="loginScreen">
  <div class="login-card">
    <div class="login-accent"></div>
    <div class="login-body">
      <div class="login-logo">
        <img src="/assets/logo-color.png" alt="Alira Health" class="logo-img" style="height:52px">
      </div>
      <p class="login-subtitle">xCSG Value Measurement Tracker</p>

      <div class="error-msg" id="loginError">
        Invalid username or password. Please try again.
      </div>

      <form id="loginForm" autocomplete="on" onsubmit="return false">
        <div class="form-group" style="margin-bottom:20px">
          <label for="loginUsername">Username</label>
          <input type="text" id="loginUsername" placeholder="Enter your username" autocomplete="username" required>
        </div>
        <div class="form-group" style="margin-bottom:20px">
          <label for="loginPassword">Password</label>
          <input type="password" id="loginPassword" placeholder="Enter your password" autocomplete="current-password" required>
        </div>
        <button type="submit" class="btn btn-primary" style="width:100%;padding:14px 24px;font-size:15px;margin-top:8px" id="loginBtn">Sign In</button>
      </form>

      <div class="login-footer">© 2026 Alira Health — Confidential</div>
    </div>
  </div>
</div>

<!-- ═══════════════════════════════════════════════════════════════════════════
     APP SHELL
     ═══════════════════════════════════════════════════════════════════════════ -->
<div id="appShell">

  <!-- Sidebar -->
  <nav class="sidebar">
    <div class="sidebar-logo">
      <img src="/assets/logo-white.png" alt="Alira Health" class="logo-img" style="height:40px">
    </div>

    <div class="sidebar-nav">
      <div class="nav-item" data-route="dashboard" id="navDashboard">Dashboard</div>
      <div class="nav-item new-btn" data-route="new" id="navNew">+ New Deliverable</div>
      <div class="nav-item" data-route="deliverables" id="navDeliverables">Deliverables</div>
      <div class="nav-item" data-route="norms" id="navNorms">Legacy Norms</div>
      <div class="nav-item" data-route="activity" id="navActivity">Activity Log</div>
    </div>

    <div class="sidebar-footer">© 2026 Alira Health</div>
  </nav>

  <!-- Main -->
  <div class="main">
    <div class="topbar">
      <span class="topbar-title" id="topbarTitle">Dashboard</span>
      <div class="topbar-right">
        <div class="topbar-user">
          <span id="topbarUsername"></span>
          <div class="user-avatar" id="topbarAvatar">A</div>
        </div>
        <button class="btn-logout" id="logoutBtn">Logout</button>
      </div>
    </div>

    <div class="content" id="mainContent">
      <!-- Views rendered here by app.js -->
    </div>
  </div>
</div>

<!-- ═══════════════════════════════════════════════════════════════════════════
     EXPERT VIEW (standalone — no sidebar, no auth)
     ═══════════════════════════════════════════════════════════════════════════ -->
<div id="expertView">
  <div class="expert-header">
    <div class="expert-header-inner">
      <img src="/assets/logo-white.png" alt="Alira Health" class="logo-img" style="height:40px">
      <small>Expert Assessment</small>
    </div>
  </div>

  <div class="expert-container" id="expertContent">
    <!-- populated by app.js -->
  </div>

  <div class="expert-footer">
    © 2026 Alira Health — Confidential · xCSG Value Measurement
  </div>
</div>

</body>
</html>
