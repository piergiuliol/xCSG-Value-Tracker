<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>xCSG Value Tracker — Alira Health</title>
  <link rel="stylesheet" href="/styles.css?v=20260406v3">
  <script src="https://cdn.jsdelivr.net/npm/chart.js@4.4.0/dist/chart.umd.min.js" defer></script>
  <script src="/app.js?v=20260406v4" defer></script>
</head>
<body>

<!-- ─── Toast Container ───────────────────────────────────────────────────── -->
<div id="toastContainer"></div>

<!-- ─── Modal ────────────────────────────────────────────────────────────── -->
<div class="modal-overlay" id="globalModal">
  <div class="modal-card" id="globalModalCard">
    <!-- populated by JS -->
  </div>
</div>

<!-- ═══════════════════════════════════════════════════════════════════════════
     LOGIN SCREEN
     ═══════════════════════════════════════════════════════════════════════════ -->
<div id="loginScreen">
  <div class="login-card">
    <div class="login-accent"></div>
    <div class="login-body">
      <div class="login-logo">
        <img src="/assets/logo-color.png" alt="Alira Health" class="logo-img login-logo-img">
      </div>
      <p class="login-subtitle">xCSG Value Measurement Tracker</p>

      <div class="error-msg" id="loginError">
        Invalid username or password. Please try again.
      </div>

      <form id="loginForm" autocomplete="on" onsubmit="return false">
        <div class="form-group" style="margin-bottom:20px">
          <label for="loginUsername">Username</label>
          <input type="text" id="loginUsername" placeholder="Enter your username" autocomplete="username" required>
        </div>
        <div class="form-group" style="margin-bottom:20px">
          <label for="loginPassword">Password</label>
          <input type="password" id="loginPassword" placeholder="Enter your password" autocomplete="current-password" required>
        </div>
        <button type="submit" class="btn btn-primary" style="width:100%;padding:14px 24px;font-size:15px;margin-top:8px" id="loginBtn">Sign In</button>
      </form>

      <div class="login-footer">© 2026 Alira Health — Confidential</div>
    </div>
  </div>
</div>

<!-- ═══════════════════════════════════════════════════════════════════════════
     APP SHELL
     ═══════════════════════════════════════════════════════════════════════════ -->
<div id="appShell">

  <!-- Sidebar -->
  <nav class="sidebar">
    <div class="sidebar-logo">
      <img src="/assets/logo-white.png?v=2" alt="Alira Health" class="logo-img sidebar-logo-img">
    </div>

    <div class="sidebar-nav">
      <div class="nav-item" data-route="portfolio" id="navPortfolio"><svg class="nav-icon" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="1.5"><rect x="3" y="3" width="7" height="7" rx="1"/><rect x="14" y="3" width="7" height="7" rx="1"/><rect x="3" y="14" width="7" height="7" rx="1"/><rect x="14" y="14" width="7" height="7" rx="1"/></svg>Portfolio</div>
      <div class="nav-item new-btn" data-route="new" id="navNew"><svg class="nav-icon" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2"><line x1="12" y1="5" x2="12" y2="19"/><line x1="5" y1="12" x2="19" y2="12"/></svg>New Project</div>
      <div class="nav-item" data-route="projects" id="navProjects"><svg class="nav-icon" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="1.5"><path d="M9 5H7a2 2 0 00-2 2v12a2 2 0 002 2h10a2 2 0 002-2V7a2 2 0 00-2-2h-2"/><rect x="9" y="3" width="6" height="4" rx="1"/><line x1="9" y1="12" x2="15" y2="12"/><line x1="9" y1="16" x2="13" y2="16"/></svg>Projects</div>
      <div class="nav-item" data-route="norms" id="navNorms"><svg class="nav-icon" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="1.5"><ellipse cx="12" cy="5" rx="9" ry="3"/><path d="M21 12c0 1.66-4 3-9 3s-9-1.34-9-3"/><path d="M3 5v14c0 1.66 4 3 9 3s9-1.34 9-3V5"/></svg>Norms v2</div>
      <div class="nav-item" data-route="settings" id="navSettings"><svg class="nav-icon" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="1.5"><circle cx="12" cy="12" r="3"/><path d="M19.4 15a1.65 1.65 0 00.33 1.82l.06.06a2 2 0 010 2.83 2 2 0 01-2.83 0l-.06-.06a1.65 1.65 0 00-1.82-.33 1.65 1.65 0 00-1 1.51V21a2 2 0 01-4 0v-.09A1.65 1.65 0 009 19.4a1.65 1.65 0 00-1.82.33l-.06.06a2 2 0 01-2.83-2.83l.06-.06A1.65 1.65 0 004.68 15a1.65 1.65 0 00-1.51-1H3a2 2 0 010-4h.09A1.65 1.65 0 004.6 9a1.65 1.65 0 00-.33-1.82l-.06-.06a2 2 0 012.83-2.83l.06.06A1.65 1.65 0 009 4.68a1.65 1.65 0 001-1.51V3a2 2 0 014 0v.09a1.65 1.65 0 001 1.51 1.65 1.65 0 001.82-.33l.06-.06a2 2 0 012.83 2.83l-.06.06A1.65 1.65 0 0019.4 9a1.65 1.65 0 001.51 1H21a2 2 0 010 4h-.09a1.65 1.65 0 00-1.51 1z"/></svg>Settings</div>
      <div class="nav-item" data-route="activity" id="navActivity"><svg class="nav-icon" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="1.5"><circle cx="12" cy="12" r="10"/><polyline points="12 6 12 12 16 14"/></svg>Activity Log</div>
    </div>

    <div class="sidebar-footer">© 2026 Alira Health</div>
  </nav>

  <!-- Main -->
  <div class="main">
    <div class="topbar">
      <span class="topbar-title" id="topbarTitle">Portfolio</span>
      <div class="topbar-right">
        <div class="topbar-user">
          <span id="topbarUsername"></span>
          <div class="user-avatar" id="topbarAvatar">A</div>
        </div>
        <button class="btn-logout" id="logoutBtn">Logout</button>
      </div>
    </div>

    <div class="content" id="mainContent">
      <!-- Views rendered here by app.js -->
    </div>
  </div>
</div>

<!-- ═══════════════════════════════════════════════════════════════════════════
     EXPERT VIEW (standalone — no sidebar, no auth)
     ═══════════════════════════════════════════════════════════════════════════ -->
<div id="expertView">
  <div class="expert-header">
    <div class="expert-header-inner">
      <img src="/assets/logo-white.png?v=2" alt="Alira Health" class="logo-img expert-logo-img">
      <small>Expert Assessment</small>
    </div>
  </div>

  <div class="expert-container" id="expertContent">
    <!-- populated by app.js -->
  </div>

  <div class="expert-footer">
    © 2026 Alira Health — Confidential · xCSG Value Measurement
  </div>
</div>

</body>
</html>
